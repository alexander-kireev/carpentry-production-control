services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-carpentry_production_control}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-carpentry_production_control}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      # In Compose the app reaches PostgreSQL via the service name, overriding the
      # host-oriented DB_HOST from .env.
      DB_HOST: db
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
